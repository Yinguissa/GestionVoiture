<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublié - AutoLoc Pro</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
</head>

<body>
    <div class="auth-layout">
        <div class="auth-left">
            <div class="auth-card animate-scale-in" style="text-align:center;">
                <div class="auth-logo" style="justify-content:center;">
                    <div class="auth-logo-icon"><i class="ph ph-car-profile" style="color: white;"></i></div>
                    <div class="auth-logo-text">Auto<span>Loc</span></div>
                </div>
                <div style="font-size:3rem;margin-bottom:var(--space-4);"><i class="ph ph-key"
                        style="color:var(--primary-500);"></i></div>
                <h1 class="auth-title">Mot de passe oublié</h1>
                <p class="auth-subtitle">Entrez votre email et nous vous enverrons un lien de réinitialisation.</p>

                <form id="forgotForm" onsubmit="handleForgotPassword(event)">
                    <div class="form-group" style="text-align:left;">
                        <label class="form-label" for="email">Adresse email</label>
                        <div class="form-input-group">
                            <span class="input-icon"><i class="ph ph-envelope"></i></span>
                            <input type="email" id="email" class="form-input" placeholder="votre@email.com" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg"><i class="ph ph-paper-plane-tilt"
                            style="font-size:18px;"></i> Envoyer le lien</button>
                </form>

                <div class="auth-footer">
                    <a href="connexion.html"><i class="ph ph-arrow-left"></i> Retour à la connexion</a>
                </div>
            </div>
        </div>
        <div class="auth-right">
            <div class="auth-right-content">
                <div style="font-size:5rem;margin-bottom:var(--space-6);"><i class="ph ph-envelope-simple"
                        style="color:rgba(255,255,255,0.9);"></i></div>
                <h2>Réinitialisation</h2>
                <p>Un lien sécurisé sera envoyé à votre adresse email pour réinitialiser votre mot de passe.</p>
            </div>
        </div>
    </div>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/auth.js"></script>
</body>

</html>
